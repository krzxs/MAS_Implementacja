<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head th:replace="~{fragments :: head('Szczegóły wypożyczenia')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">Umowa wypożyczenia</h3>
        <span class="badge fs-6"
              th:classappend="${w.status.name()=='AKTYWNE'} ? 'bg-warning text-dark' : (${w.status.name()=='ZAKONCZONE'} ? 'bg-success' : 'bg-secondary')"
              th:text="${w.status.opis}">Status</span>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <div class="row">
                <div class="col-md-6 mb-2">
                    <div class="label-dim">Numer</div>
                    <div th:text="${w.numerWypozyczenia}"></div>
                </div>
                <div class="col-md-6 mb-2">
                    <div class="label-dim">Klient</div>
                    <div th:text="${w.klient.osoba.imie + ' ' + w.klient.osoba.nazwisko}"></div>
                </div>
                <div class="col-md-6 mb-2">
                    <div class="label-dim">Pojazd</div>
                    <div th:text="${w.pojazd.typPojazdu + ': ' + w.pojazd.marka + ' ' + w.pojazd.model + ' (' + w.pojazd.numerRejestracyjny + ')'}"></div>
                </div>
                <div class="col-md-6 mb-2">
                    <div class="label-dim">Pracownik obsługujący</div>
                    <div th:text="${w.pracownik != null ? w.pracownik.osoba.imie + ' ' + w.pracownik.osoba.nazwisko : '-'}"></div>
                </div>
                <div class="col-md-6 mb-2">
                    <div class="label-dim">Okres</div>
                    <div>
                        <span th:text="${#temporals.format(w.dataOd, 'dd.MM.yyyy')}"></span> -
                        <span th:text="${#temporals.format(w.dataDo, 'dd.MM.yyyy')}"></span>
                        (<span th:text="${w.liczbaDni}"></span> dni)
                    </div>
                </div>
                <div class="col-md-6 mb-2">
                    <div class="label-dim">Ubezpieczenie</div>
                    <div th:text="${w.ubezpieczenie != null ? w.ubezpieczenie.typ.opis + ' (' + w.ubezpieczenie.skladkaDzienna + ' zł/dzień)' : 'Brak'}"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-3" th:if="${!w.wypozyczenieDodatki.isEmpty()}">
        <div class="card-header bg-white fw-semibold">Dodatki</div>
        <div class="table-responsive">
            <table class="table mb-0">
                <thead><tr><th>Dodatek</th><th class="text-center">Ilość</th><th class="text-end">Koszt</th></tr></thead>
                <tbody>
                <tr th:each="wd : ${w.wypozyczenieDodatki}">
                    <td th:text="${wd.dodatek.nazwa}"></td>
                    <td class="text-center" th:text="${wd.ilosc}"></td>
                    <td class="text-end" th:text="${wd.koszt + ' zł'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <div class="label-dim">Płatność</div>
                <div th:if="${!w.platnosci.isEmpty()}">
                    <span th:text="${w.platnosci[0].metoda.opis}"></span> ·
                    <span th:text="${w.platnosci[0].status.opis}"></span>
                </div>
                <div th:if="${w.platnosci.isEmpty()}" class="label-dim">brak</div>
            </div>
            <div class="text-end">
                <div class="label-dim">Koszt całkowity</div>
                <div class="fs-4 fw-bold" th:text="${w.kosztCalkowity + ' zł'}"></div>
            </div>
        </div>
    </div>

    <div class="card mb-3" th:if="${!w.szkody.isEmpty()}">
        <div class="card-header bg-white fw-semibold">Zgłoszone szkody</div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item" th:each="s : ${w.szkody}">
                <span th:text="${s.opis}"></span>
                <span class="label-dim" th:text="'(' + ${s.status.opis} + ')'"></span>
            </li>
        </ul>
    </div>

    <div class="card" th:if="${w.status.name()=='AKTYWNE' and isKonsultant}">
        <div class="card-body">
            <h6 class="card-title">Zwrot pojazdu</h6>
            <form method="post" th:action="@{/wypozyczenie/{id}/zwrot(id=${w.id})}">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="szkoda" value="true" id="szkoda"
                           onclick="document.getElementById('opisBox').classList.toggle('d-none')">
                    <label class="form-check-label" for="szkoda">Zgłoś szkodę przy zwrocie (pojazd trafi do serwisu)</label>
                </div>
                <div id="opisBox" class="d-none my-2">
                    <textarea name="opisSzkody" class="form-control" rows="2" placeholder="Opis szkody"></textarea>
                </div>
                <button class="btn btn-warning mt-2">Zwróć samochód</button>
            </form>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/flota}" class="btn btn-link">← Wróć do floty</a>
    </div>
</div>
</body>
</html>

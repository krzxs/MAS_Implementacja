<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head th:replace="~{fragments :: head(${edycja} ? 'Edycja pojazdu' : 'Nowy pojazd')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container my-4" style="max-width: 760px;">
    <h3 class="mb-3" th:text="${edycja} ? 'Edycja pojazdu' : 'Nowy pojazd'">Pojazd</h3>

    <div th:if="${blad}" class="alert alert-danger" th:text="${blad}"></div>

    <form method="post" th:object="${form}"
          th:action="${edycja} ? @{/flota/{id}(id=${pojazdId})} : @{/flota}">
        <div class="card">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Typ pojazdu</label>
                        <select th:if="${!edycja}" id="typSelect" class="form-select" th:field="*{typ}">
                            <option value="OSOBOWY">Samochód osobowy</option>
                            <option value="DOSTAWCZY">Samochód dostawczy</option>
                            <option value="MOTOCYKL">Motocykl</option>
                        </select>
                        <div th:if="${edycja}">
                            <input type="text" class="form-control" disabled
                                   th:value="${form.typ == 'OSOBOWY' ? 'Samochód osobowy' : (form.typ == 'DOSTAWCZY' ? 'Samochód dostawczy' : 'Motocykl')}">
                            <input type="hidden" id="typFixed" th:field="*{typ}">
                            <small class="label-dim">Typu pojazdu nie można zmienić po utworzeniu.</small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Numer rejestracyjny</label>
                        <input type="text" class="form-control" th:field="*{numerRejestracyjny}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Marka</label>
                        <input type="text" class="form-control" th:field="*{marka}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Model</label>
                        <input type="text" class="form-control" th:field="*{model}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Rok produkcji</label>
                        <input type="number" min="1950" class="form-control" th:field="*{rokProdukcji}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Przebieg (km)</label>
                        <input type="number" min="0" class="form-control" th:field="*{przebieg}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Stawka dzienna (zł)</label>
                        <input type="number" step="0.01" min="0" class="form-control" th:field="*{stawkaDzienna}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Kategoria</label>
                        <select class="form-select" th:field="*{kategoriaId}" required>
                            <option value="">-- wybierz kategorię --</option>
                            <option th:each="k : ${kategorie}" th:value="${k.id}" th:text="${k.nazwa}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Oddział</label>
                        <select class="form-select" th:field="*{oddzialId}" required>
                            <option value="">-- wybierz oddział --</option>
                            <option th:each="o : ${oddzialy}" th:value="${o.id}" th:text="${o.nazwa}"></option>
                        </select>
                    </div>

                    <div class="col-12 typ-group" data-typ="OSOBOWY">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Liczba miejsc</label>
                                <input type="number" min="1" class="form-control" th:field="*{liczbaMiejsc}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Typ nadwozia</label>
                                <select class="form-select" th:field="*{typNadwozia}" required>
                                    <option value="">-- wybierz --</option>
                                    <option th:each="t : ${typyNadwozia}" th:value="${t.name()}" th:text="${t.opis}"></option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="col-12 typ-group" data-typ="DOSTAWCZY">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Ładowność (kg)</label>
                                <input type="number" step="0.1" min="0" class="form-control" th:field="*{ladownosc}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Pojemność ładunkowa (m³)</label>
                                <input type="number" step="0.1" min="0" class="form-control" th:field="*{pojemnoscLadunkowa}">
                            </div>
                        </div>
                    </div>

                    <div class="col-12 typ-group" data-typ="MOTOCYKL">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Pojemność silnika (cm³)</label>
                                <input type="number" min="0" class="form-control" th:field="*{pojemnoscSilnika}">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-primary" th:text="${edycja} ? 'Zapisz zmiany' : 'Dodaj pojazd'">Zapisz</button>
            <a th:href="@{/flota}" class="btn btn-link">Anuluj</a>
        </div>
    </form>
</div>

<script>
    (function () {
        function aktualnyTyp() {
            var sel = document.getElementById('typSelect');
            if (sel) { return sel.value; }
            var fixed = document.getElementById('typFixed');
            return fixed ? fixed.value : 'OSOBOWY';
        }
        function pokazPolaTypu() {
            var typ = aktualnyTyp();
            document.querySelectorAll('.typ-group').forEach(function (grupa) {
                grupa.style.display = (grupa.getAttribute('data-typ') === typ) ? '' : 'none';
            });
        }
        var sel = document.getElementById('typSelect');
        if (sel) { sel.addEventListener('change', pokazPolaTypu); }
        pokazPolaTypu();
    })();
</script>
</body>
</html>

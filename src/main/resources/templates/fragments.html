<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head th:fragment="head(tytul)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${tytul} + ' - SWS'">SWS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
        body { background: #f5f6f8; }
        .navbar-brand { font-weight: 700; letter-spacing: .3px; }
        .app-header { background: #1f4e79; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        .table thead th { background: #eef2f7; }
        .label-dim { color: #6c757d; font-size: .85rem; }
    </style>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark app-header">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">SWS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/flota}">Flota</a>
                <a class="nav-link" th:href="@{/klienci}">Klienci</a>
                <a class="nav-link" th:href="@{/cennik}" th:if="${isKierownik}">Cennik</a>
            </div>
            <div class="navbar-nav ms-auto align-items-lg-center" th:if="${zalogowany != null}">
                <span class="navbar-text text-white-50 me-lg-3">
                    Zalogowano:
                    <span class="text-white" th:text="${zalogowany.osoba.imie + ' ' + zalogowany.osoba.nazwisko}">-</span>
                    (<span th:text="${zalogowany.stanowisko.opis}">-</span>)
                </span>
                <form method="post" th:action="@{/logout}" class="d-inline">
                    <button class="btn btn-sm btn-outline-light">Wyloguj</button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
